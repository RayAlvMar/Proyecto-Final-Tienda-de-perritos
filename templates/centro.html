{% extends "base.html" %}

{% block contenido %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Tienda Perritos</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f5f7fa;
        }

        .card{
            border:none;
            border-radius:15px;
            transition:0.3s;
        }

        .card:hover{
            transform:translateY(-5px);
            box-shadow:0 10px 20px rgba(0,0,0,0.15);
        }

        .badge-tipo{
            position:absolute;
            top:15px;
            right:15px;
        }

        .precio{
            color:green;
            font-size:1.3rem;
            font-weight:bold;
        }
    </style>
</head>
<body>

<div class="container py-5">

    <h1 class="text-center mb-5">🐶 Tienda de Perritos</h1>

    <div class="row" id="contenedor-perros">
        <!-- Aquí se insertan las cards -->
    </div>

</div>

<script>

    // DATOS TRAIDOS DESDE MONGODB
    // normalmente esto vendría desde Flask/FastAPI/Node

    const perros = {{ perros | tojson }};

    const contenedor = document.getElementById("contenedor-perros");

    perros.forEach(perro => {

        const tipoBadge = perro.tipo === "venta"
            ? `<span class="badge bg-success badge-tipo">Venta</span>`
            : `<span class="badge bg-primary badge-tipo">Adopción</span>`;

        const precio = perro.precio
            ? `<p class="precio">$${perro.precio} MXN</p>`
            : `<p class="text-muted">🐾 Adopción Responsable</p>`;

        const card = `
        
        <div class="col-md-6 col-lg-4 mb-4">

            <div class="card h-100 shadow-sm position-relative">

                ${tipoBadge}

                <div class="card-body">

                    <h3 class="card-title">${perro.nombre}</h3>

                    ${precio}

                    <ul class="list-group list-group-flush">

                        <li class="list-group-item">
                            <strong>Raza:</strong> ${perro.raza || "No disponible"}
                        </li>

                        <li class="list-group-item">
                            <strong>Edad:</strong> ${perro.edad || "No disponible"}
                        </li>

                        <li class="list-group-item">
                            <strong>Sexo:</strong> ${perro.sexo || "No disponible"}
                        </li>

                        <li class="list-group-item">
                            <strong>Tamaño:</strong> ${perro.tamano || "No disponible"}
                        </li>

                        <li class="list-group-item">
                            <strong>Peso:</strong> ${perro.peso_actual || "No disponible"}
                        </li>

                        <li class="list-group-item">
                            <strong>Pelaje:</strong> ${perro.color_pelaje || "No disponible"}
                        </li>

                        <li class="list-group-item">
                            <strong>Temperamento:</strong> ${perro.temperamento || "No disponible"}
                        </li>

                        <li class="list-group-item">
                            <strong>Energía:</strong> ${perro.nivel_energia || "No disponible"}
                        </li>

                    </ul>

                    <div class="mt-3">

                        <h5>Salud</h5>

                        <p>
                            Vacunas: ${perro.salud?.vacunas || "No"} <br>
                            Desparasitación: ${perro.salud?.desparasitacion || "No"} <br>
                            Esterilizado: ${perro.salud?.esterilizado || "No"} <br>
                        </p>

                    </div>

                </div>

            </div>

        </div>
        `;

        contenedor.innerHTML += card;
    });

</script>

</body>
</html>
{% endblock %}
