{% extends "base.html" %}

{% block rayito %}
<h2 class="ms-4 mb-0 fw-light text-uppercase text-secondary-custom" style="letter-spacing: 4px; font-size: 1.4rem;">
    INICIAR SESIÓN
</h2>
{% endblock %}

{% block contenido %}
    <div class="container py-5">

        <div class="row justify-content-center">

            <div class="col-md-6">

                <div class="card-custom p-5 rounded-4 shadow-sm">

                    <div class="mb-4">
                        <h1 class="fw-bold mb-1" style="color: var(--brown); font-size: 2rem;">
                            Iniciar sesión
                        </h1>

                        <p class="text-muted small">
                            Bienvenido de vuelta ꠹
                        </p>
                    </div>

                    <form method="POST" action="/login">

                        <div class="mb-4">
                            <div class="p-3 bg-white rounded-4 d-flex align-items-center gap-2">
                                <i class="bi bi-envelope text-muted fs-5"></i>

                                <input type="email"
                                       name="email"
                                       class="form-control border-0 shadow-none p-0"
                                       placeholder="Correo electrónico"
                                       required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <div class="p-3 bg-white rounded-4 d-flex align-items-center gap-2">
                                <i class="bi bi-lock text-muted fs-5"></i>

                                <input type="password"
                                       name="password"
                                       class="form-control border-0 shadow-none p-0"
                                       placeholder="Contraseña"
                                       required>
                            </div>
                        </div>

                        <button type="submit"
                                class="btn btn-link-custom w-100 py-3 fw-bold rounded-4">
                            Entrar
                        </button>

                        <div class="mt-4 d-flex justify-content-between align-items-center">

                            <small>
                                <a href="/recuperar" class="text-decoration-none text-muted">
                                    ¿Olvidaste tu contraseña?
                                </a>
                            </small>

                            <small>
                                <a href="/registrar" class="text-decoration-none text-link-custom fw-bold">
                                    Crear cuenta
                                </a>
                            </small>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>
{% endblock %}
