{% extends "base.html" %}

{% block rayito %}
<h2 class="ms-4 mb-0 fw-light text-uppercase text-secondary-custom" style="letter-spacing: 4px; font-size: 1.4rem;">
    INICIAR SESIÓN ૮ • ﻌ - ა
</h2>
{% endblock %}

{% block contenido %}

<div class="container mt-5">

    <div class="text-center mb-4">
        <h2 class="fw-light">Inicio de sesión</h2>
        <p class="text-muted">Si volviste aquí es porque te gustó
            ૮ • ﻌ - ა
        </p>
</div>

<div class="row justify-content-center">
<div class="col-md-5">
<div class="p-4 rounded-4 shadow-sm card-custom">
<div class="p-4 rounded-4 shadow-sm">
    

    <form method="POST" action="/login">


<div class="input-group mb-3 border rounded-3 overflow-hidden">
     <span class="input-group-text bg-transparent border-0">
        <i class="bi bi-envelope"></i>
    </span>
    <input type="email" name="email" class="form-control border-0" placeholder="Ingresa tu correo electrónico" required>
</div>

<div class="input-group mb-4 border rounded-3 overflow-hidden">
    <span class="input-group-text bg-transparent border-0">
        <i class="bi bi-lock"></i>
    </span>
    <input type="password" name="password" class="form-control border-0" placeholder="Ingresa tu contraseña" required>
</div>

<button type="submit" class="btn btn-dog-orange w-100 rounded-3">
    Iniciar sesión
</button>

<div class="text-center mt-3">
    <small class="text-muted">¿No tienes cuenta?
        <a href="/registrar" class="text-decoration-none text-link-custom">Crea una ahora</a>
    </small>
</div>

</form>
</div>
</div>
</div>
<footer class="dog-footer"></footer>

{% endblock %}
