{% extends "base.html" %}

{% block rayito %}
<div class="container mt-4 text-center">
    <h2 class="fw-bold text-uppercase text-secondary-custom" style="letter-spacing: 6px;">
        REGISTRO
    </h2>
    <p class="text-muted">
        Únete a DoggyWorld
    </p>
</div>
{% endblock %}

{% block contenido %}

<div class="container py-5">

    <div class="row justify-content-center align-items-center g-4">

        <div class="col-lg-4">
            <div class="card-custom p-4 rounded-5 h-100 d-flex flex-column justify-content-center text-center">
                <i class="bi bi-person-hearts mb-3 text-link-custom" style="font-size: 4rem;"></i>

                <h4 class="fw-bold text-secondary-custom">
                    Crea tu perfil
                </h4>

                <p class="text-muted small">
                    Accede a adopciones, compras y más
                </p>
            </div>
        </div>

        <div class="col-lg-6">

            <div class="card-custom p-5 rounded-5 shadow-sm">

                <form method="POST" action="/registrar">

                    <div class="row g-3">

                        <div class="col-12">
                            <div class="d-flex align-items-center bg-white rounded-4 px-3 py-2">
                                <i class="bi bi-person-fill text-muted me-2"></i>
                                <input type="text" name="nombre" class="form-control border-0 shadow-none"
                                       placeholder="Usuario" required>
                            </div>
                        </div>

                        <div class="col-12">
                            <div class="d-flex align-items-center bg-white rounded-4 px-3 py-2">
                                <i class="bi bi-envelope-fill text-muted me-2"></i>
                                <input type="email" name="email" class="form-control border-0 shadow-none"
                                       placeholder="Correo electrónico" required>
                            </div>
                        </div>

                        <div class="col-12">
                            <div class="d-flex align-items-center bg-white rounded-4 px-3 py-2">
                                <i class="bi bi-lock-fill text-muted me-2"></i>
                                <input type="password" name="password" class="form-control border-0 shadow-none"
                                       placeholder="Contraseña" required>
                            </div>
                        </div>

                        <div class="col-6">
                            <div class="d-flex align-items-center bg-white rounded-4 px-3 py-2">
                                <i class="bi bi-balloon-heart text-muted me-2"></i>
                                <input type="number" name="edad" class="form-control border-0 shadow-none"
                                       placeholder="Edad" required>
                            </div>
                        </div>

                        <div class="col-6">
                            <div class="d-flex align-items-center bg-white rounded-4 px-3 py-2">
                                <i class="bi bi-gender-ambiguous text-muted me-2"></i>
                                <input type="text" name="genero" class="form-control border-0 shadow-none"
                                       placeholder="Género" required>
                            </div>
                        </div>

                        <div class="col-12 mt-2">
                            <button type="submit"
                                    class="btn btn-primary-soft w-100 py-3 rounded-4 fw-bold">
                                Crear cuenta
                            </button>
                        </div>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
