{% extends "base.html" %}

{% block rayito %}
<div class="container mt-4">
    <div class="text-center">
        <h2 class="fw-bold text-uppercase text-secondary-custom" style="letter-spacing: 5px; font-size: 1.5rem;">
            REGISTRARSE
        </h2>

        <p class="text-muted">
            Forma parte de DoggyWorld
        </p>
    </div>
</div>
{% endblock %}

{% block contenido %}

<div class="container mt-4">
<div class="row justify-content-center">
<div class="col-md-6 col-lg-5">
<div class="card-custom p-5 rounded-5 shadow-sm">

<div class="text-center mb-4">
    <div class="mb-3">
        <i class="bi bi-heart-fill text-link-custom" style="font-size: 3rem;"></i>
    </div>
    <h2 class="fw-bold text-secondary-custom">
        Crear cuenta
    </h2>
    <p class="text-muted">
        Regístrate en menos de 3 minutos
    </p>
</div>
<form method="POST" action="/registrar">

<div class="mb-3">
    <label class="form-label fw-semibold text-secondary-custom">
        Usuario
    </label>
    <div class="input-group border rounded-4 overflow-hidden">

        <span class="input-group-text bg-transparent border-0">
            <i class="bi bi-person-fill"></i>
        </span>
        <input type="text" name="nombre" class="form-control border-0 py-3" placeholder="Ingresa tu usuario" required>
    </div>
</div>

<div class="mb-3">
    <label class="form-label fw-semibold text-secondary-custom">
        Correo electrónico
    </label>
    <div class="input-group border rounded-4 overflow-hidden">
        <span class="input-group-text bg-transparent border-0">
            <i class="bi bi-envelope-fill"></i>
        </span>
        <input type="email" name="email" class="form-control border-0 py-3" placeholder="Ingresa tu correo" required>
    </div>
</div>

<div class="mb-3">

    <label class="form-label fw-semibold text-secondary-custom">
        Contraseña
    </label>

    <div class="input-group border rounded-4 overflow-hidden">

        <span class="input-group-text bg-transparent border-0">
            <i class="bi bi-lock-fill"></i>
        </span>

        <input type="password" name="password" class="form-control border-0 py-3" placeholder="Ingresa tu contraseña" required>
    </div>
</div>
<div class="row">

<div class="col-md-6 mb-3">
    <label class="form-label fw-semibold text-secondary-custom">
        Edad
    </label>
    <div class="input-group border rounded-4 overflow-hidden">
        <span class="input-group-text bg-transparent border-0">
            <i class="bi bi-balloon-heart"></i>
        </span>
        <input type="number" name="edad" class="form-control border-0 py-3" placeholder="Edad" required>
    </div>
</div>

<div class="col-md-6 mb-4">
    <label class="form-label fw-semibold text-secondary-custom">
        Género
    </label>
    <div class="input-group border rounded-4 overflow-hidden">
        <span class="input-group-text bg-transparent border-0">
            <i class="bi bi-gender-ambiguous"></i>
        </span>
        <input type="text" name="genero" class="form-control border-0 py-3" placeholder="Género" required>
    </div>
</div>
</div>

<button type="submit" class="btn btn-primary-soft w-100 rounded-4 py-3 fw-semibold">
    Crear cuenta 🦴
</button>

</div>
</div>
</div>
</div>
{% endblock %}
