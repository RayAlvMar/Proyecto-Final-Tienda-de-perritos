{% extends "base.html" %}

{% block rayito %}
<h2 class="ms-4 mb-0 fw-light text-uppercase text-secondary-custom" style="letter-spacing: 4px; font-size: 1.4rem;">
    REGISTRARSE ⚝
</h2>
{% endblock %}

{% block contenido %}
<div class="container mt-5">

<div class="text-center mb-4">
    <div>
        <i class="bi bi-person-circle fs-1 mb-2 text-link-custom"></i>
    </div>
    <h2 class="fw-light">Registrate aquí</h2>
    <p class="text-muted">En tan solo 3 minutos</p>
</div>

<div class="row justify-content-center">
<div class="col-md-5">
<div class="p-4 rounded-4 shadow-sm card-custom">

<form method="POST" action="/registrar">

<div class="input-group mb-3 border rounded-3 overflow-hidden">
    <span class="input-group-text bg-transparent border-0">
        <i class="bi bi-person"></i>
    </span>
    <input type="text" name="nombre" class="form-control border-0" placeholder="Ingresa tu nombre de usuario" required>
</div>

<div class="input-group mb-3 border rounded-3 overflow-hidden">
    <span class="input-group-text bg-transparent border-0">
        <i class="bi bi-envelope"></i>
    </span>
    <input type="email" name="email" class="form-control border-0" placeholder="Ingresa tu correo electrónico" required>
</div>

<div class="input-group mb-4 border rounded-3 overflow-hidden">
    <span class="input-group-text bg-transparent border-0">
        <i class="bi bi-lock"></i>
    </span>
    <input type="password" name="password" class="form-control border-0" placeholder="Ingresa tu contraseña" required>
</div>


<div class="input-group mb-4 border rounded-3 overflow-hidden">
    <span class="input-group-text bg-transparent border-0">
        <i class="bi bi-balloon"></i>
    </span>
    <input type="number" name="edad" class="form-control border-0" placeholder="Ingresa tu edad" required>
</div>


<div class="input-group mb-4 border rounded-3 overflow-hidden">
    <span class="input-group-text bg-transparent border-0">
       <i class="bi bi-gender-ambiguous"></i>    </span>
    <input type="text" name="genero" class="form-control border-0" placeholder="Ingresa tu género" required>
</div>

<button type="submit" class="btn btn-primary w-100 rounded-3">
    Listo!
</button>

</form>

</div>
</div>
</div>

{% endblock %}
